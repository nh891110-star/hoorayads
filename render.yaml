services:
  - type: web
    name: tiktok-ads-agent-poc
    runtime: node
    plan: starter
    buildCommand: pnpm install --frozen-lockfile
    startCommand: pnpm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: TIKTOK_APP_ENV
        value: dev
      - key: TIKTOK_APP_ID
        sync: false
      - key: TIKTOK_APP_SECRET
        sync: false
      - key: TIKTOK_REDIRECT_URI
        value: https://tiktok-ads-agent-poc.onrender.com/callback
      - key: TIKTOK_ADVERTISER_AUTH_URL
        sync: false
      - key: TIKTOK_MCP_URL
        value: https://ads.tiktok.com/mcp
      - key: TIKTOK_FLAT_MCP_URL
        value: https://business-api.tiktok.com/open_mcp/tt-ads-mcp-flat
      - key: REPORTING_DEFAULT_ADVERTISER_ID
        sync: false
      - key: CAMPAIGN_REVIEW_WRITE_MODE
        value: campaign_only
      - key: PUBLIC_BASE_URL
        value: https://tiktok-ads-agent-poc.onrender.com
