<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hooray TikTok Ads Mock Gallery</title>
    <link rel="stylesheet" href="./widget.css">
    <style>
      body {
        margin: 0;
        background:
          radial-gradient(circle at top left, rgba(37, 244, 238, 0.08), transparent 28%),
          radial-gradient(circle at top right, rgba(255, 45, 85, 0.06), transparent 30%),
          linear-gradient(180deg, #f7f9fc 0%, #fff 40%, #fff 100%);
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .gallery-shell {
        max-width: 1240px;
        margin: 0 auto;
        padding: 24px 16px 72px;
      }

      .gallery-grid {
        display: grid;
        gap: 24px;
      }

      .mock-step {
        background: transparent;
        border: 0;
        border-radius: 0;
        box-shadow: none;
        overflow: hidden;
      }

      .mock-step-frame {
        padding: 0;
        background: transparent;
      }

      .mock-step-label {
        margin: 0 0 10px;
        color: #647081;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .mock-step-surface {
        min-height: auto;
      }
    </style>
  </head>
  <body>
    <main class="gallery-shell">
      <div id="gallery" class="gallery-grid"></div>
    </main>
    <script src="./mock-gallery-data.js"></script>
    <script type="module" src="./mock-gallery.js"></script>
  </body>
  </html>
