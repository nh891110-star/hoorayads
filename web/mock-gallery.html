<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hooray TikTok Ads Mock Gallery</title>
    <link rel="stylesheet" href="./widget.css">
    <style>
      body {
        margin: 0;
        background:
          radial-gradient(circle at top, rgba(255, 45, 85, 0.08), transparent 28%),
          linear-gradient(180deg, #fffafc 0%, #fff 30%, #fff 100%);
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .gallery-shell {
        max-width: 1600px;
        margin: 0 auto;
        padding: 48px 24px 96px;
      }

      .gallery-header {
        margin-bottom: 32px;
      }

      .gallery-header h1 {
        margin: 0 0 12px;
        font-size: 42px;
        line-height: 1.05;
      }

      .gallery-header p {
        max-width: 900px;
        margin: 0;
        color: #5c5968;
        font-size: 18px;
        line-height: 1.6;
      }

      .gallery-grid {
        display: grid;
        gap: 24px;
      }

      .mock-step {
        background: rgba(255, 255, 255, 0.86);
        border: 1px solid rgba(255, 45, 85, 0.1);
        border-radius: 28px;
        box-shadow: 0 24px 64px rgba(17, 24, 39, 0.08);
        overflow: hidden;
      }

      .mock-step-topline {
        display: grid;
        grid-template-columns: 120px 1fr;
        gap: 20px;
        padding: 24px 28px;
        border-bottom: 1px solid rgba(17, 24, 39, 0.08);
        background: linear-gradient(135deg, rgba(255, 45, 85, 0.08), rgba(37, 244, 238, 0.08));
      }

      .mock-step-index {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 40px;
        border-radius: 999px;
        background: #111;
        color: #fff;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .mock-step-topline h2 {
        margin: 0 0 6px;
        font-size: 26px;
      }

      .mock-step-topline p {
        margin: 0;
        color: #58546b;
        line-height: 1.6;
      }

      .mock-step-frame {
        padding: 20px;
        background: linear-gradient(180deg, rgba(244, 246, 251, 0.9), rgba(255, 255, 255, 0.95));
      }

      .mock-step-surface {
        min-height: 1120px;
      }
    </style>
  </head>
  <body>
    <main class="gallery-shell">
      <header class="gallery-header">
        <h1>Hooray TikTok Ads Guided Journey</h1>
        <p>Static mock gallery for the first-launch SMB advertiser flow: onboarding, product intake, creative generation, draft review, publish, and reporting follow-through.</p>
      </header>
      <div id="gallery" class="gallery-grid"></div>
    </main>
    <script src="./mock-gallery-data.js"></script>
    <script type="module" src="./mock-gallery.js"></script>
  </body>
  </html>
